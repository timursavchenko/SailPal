<style>
	.boatsLayout {
		box-sizing: border-box;
		padding: 18px;
		height: 100%;
		display: flex;
		flex-direction: column;
		gap: 14px;
		overflow: hidden;
	}

	.boatsPanel {
		background: var(--panelColor);
		color: var(--onPanelColor);
		border-radius: 8px;
		border: 1px solid color-mix(in srgb, var(--onPanelColor) 10%, transparent);
		padding: 16px;
		box-sizing: border-box;
	}

	.boatsToolbar {
		display: grid;
		grid-template-columns: minmax(220px, 1fr) 180px 130px 150px 150px auto;
		gap: 10px;
		align-items: center;
	}

	.boatsToolbar .custom-select,
	.boatsFilters .custom-select {
		position: relative;
		width: 100%;
		min-width: 0;
	}

	.boatsToolbar input,
	.boatsToolbar select {
		width: 100%;
		height: 40px;
		box-sizing: border-box;
		border: 1px solid color-mix(in srgb, var(--onPanelColor) 16%, transparent);
		border-radius: 6px;
		padding: 0 12px;
		background: color-mix(in srgb, var(--panelColor) 80%, var(--backgroundColor));
		color: var(--onPanelColor);
	}

	.boatsToolbar input {
		width: 100%;
		height: 40px;
		box-sizing: border-box;
		border: 1px solid color-mix(in srgb, var(--onPanelColor) 16%, transparent);
		border-radius: 6px;
		padding: 0 12px;
		background: color-mix(in srgb, var(--panelColor) 80%, var(--backgroundColor));
		color: var(--onPanelColor);
	}

	.boatsToolbar input:focus,
	.boatsFilters input:focus {
		outline: none;
		border-color: color-mix(in srgb, var(--primaryColor) 60%, white 10%);
		box-shadow: 0 0 0 2px color-mix(in srgb, var(--primaryColor) 18%, transparent);
	}

	.boatsToolbar button {
		height: 40px;
		padding: 0 16px;
		white-space: nowrap;
	}

	.boatsFilters {
		display: grid;
		grid-template-columns: repeat(4, minmax(0, 1fr));
		gap: 10px;
	}

	.boatsFilters > button {
		width: 100%;
		height: 40px;
		box-sizing: border-box;
		border: 1px solid color-mix(in srgb, var(--onPanelColor) 16%, transparent);
		border-radius: 6px;
		padding: 0 12px;
		background: color-mix(in srgb, var(--panelColor) 80%, var(--backgroundColor));
		color: var(--onPanelColor);
	}


	.boatsToolbar .custom-select .select-selected,
	.boatsFilters .custom-select .select-selected {
		display: flex;
		align-items: center;
		width: 100%;
		height: 40px;
		box-sizing: border-box;
		padding-top: 0;
		padding-bottom: 0;
	}

	.boatsToolbar .custom-select .select-selected:after,
	.boatsFilters .custom-select .select-selected:after {
		top: calc(50% - 3px);
	}

	.boatsToolbar .custom-select .select-selected.select-arrow-active:after,
	.boatsFilters .custom-select .select-selected.select-arrow-active:after {
		top: calc(50% - 10px);
	}

	.boatsToolbar .custom-select .select-items,
	.boatsFilters .custom-select .select-items {
		z-index: 30;
		max-height: 280px;
		overflow-y: auto;
	}

	.boatsToolbar .custom-select .select-items div,
	.boatsFilters .custom-select .select-items div {
		padding-top: 10px;
		padding-bottom: 10px;
	}

	.boatsStatus {
		min-height: 22px;
		font-size: 14px;
		color: color-mix(in srgb, var(--onPanelColor) 72%, transparent);
	}

	.boatsStatus.boatsError {
		color: #b00020;
	}

	.boatsList {
		flex: 1 1 auto;
		min-height: 0;
		overflow: auto;
		display: grid;
		grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
		gap: 12px;
		align-content: start;
	}

	.boatCard {
		display: grid;
		grid-template-rows: 150px auto;
		min-width: 0;
		overflow: hidden;
		cursor: pointer;
		text-align: left;
		transition: border-color 120ms ease, transform 120ms ease;
	}

	.boatCard:hover,
	.boatCard:focus {
		border-color: color-mix(in srgb, var(--accentColor) 56%, var(--onPanelColor) 16%);
		outline: none;
		transform: translateY(-1px);
	}

	.boatImage {
		background: color-mix(in srgb, var(--onPanelColor) 8%, transparent);
		position: relative;
		overflow: hidden;
	}

	.boatImage img {
		width: 100%;
		height: 100%;
		object-fit: cover;
		display: block;
		position: relative;
		z-index: 1;
	}

	.boatImageFallback {
		position: absolute;
		inset: 0;
		display: flex;
		align-items: center;
		justify-content: center;
		font-size: 36px;
		color: color-mix(in srgb, var(--onPanelColor) 48%, transparent);
		z-index: 0;
	}

	.boatCardBody {
		padding: 14px;
		display: flex;
		flex-direction: column;
		gap: 10px;
	}

	.boatTitle {
		font-size: 18px;
		font-weight: 700;
		line-height: 1.2;
		word-break: break-word;
	}

	.boatSubtitle {
		font-size: 13px;
		color: color-mix(in srgb, var(--onPanelColor) 68%, transparent);
		line-height: 1.35;
	}

	.boatMetaGrid {
		display: grid;
		grid-template-columns: repeat(2, minmax(0, 1fr));
		gap: 8px;
		font-size: 13px;
	}

	.boatMetaItem {
		min-width: 0;
		padding: 8px;
		border-radius: 6px;
		background: color-mix(in srgb, var(--onPanelColor) 6%, transparent);
	}

	.boatMetaLabel {
		display: block;
		font-size: 11px;
		color: color-mix(in srgb, var(--onPanelColor) 58%, transparent);
	}

	.boatMetaValue {
		display: block;
		font-weight: 600;
		margin-top: 2px;
		word-break: break-word;
	}

	.boatOfferBadge {
		border-radius: 6px;
		padding: 9px 10px;
		background: color-mix(in srgb, var(--accentColor) 16%, transparent);
		color: var(--onPanelColor);
		font-size: 13px;
		line-height: 1.35;
	}

	.boatOfferPrice {
		font-size: 18px;
		font-weight: 800;
	}

	.boatMutedNote {
		font-size: 13px;
		color: color-mix(in srgb, var(--onPanelColor) 64%, transparent);
	}

	.boatsModal {
		position: fixed;
		inset: 0;
		z-index: 1000;
		display: grid;
		place-items: center;
		padding: 18px;
		box-sizing: border-box;
	}

	.boatsModal.boatsHidden {
		display: none;
	}

	.boatsModalBackdrop {
		position: absolute;
		inset: 0;
		background: rgba(0, 0, 0, .46);
	}

	.boatDetailsPanel {
		position: relative;
		z-index: 1;
		width: min(980px, 100%);
		max-height: min(760px, calc(100vh - 36px));
		overflow: auto;
		display: flex;
		flex-direction: column;
		gap: 14px;
		box-shadow: 0 18px 48px rgba(0, 0, 0, .28);
	}

	.boatDetailsHeader {
		display: flex;
		align-items: flex-start;
		justify-content: space-between;
		gap: 12px;
	}

	.boatDetailsTitle {
		font-size: 22px;
		font-weight: 800;
		line-height: 1.2;
	}

	.boatDetailsClose {
		min-width: 36px;
		height: 36px;
		padding: 0;
	}

	.boatDetailsGrid {
		display: grid;
		grid-template-columns: minmax(260px, .8fr) minmax(0, 1.2fr);
		gap: 14px;
	}

	.boatDetailsImage {
		min-height: 260px;
		border-radius: 6px;
	}

	.boatGalleryThumbs {
		display: grid;
		grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
		gap: 8px;
		margin-top: 10px;
	}

	.boatGalleryThumb {
		padding: 0;
		height: 64px;
		overflow: hidden;
		border-radius: 6px;
		border: 1px solid color-mix(in srgb, var(--onPanelColor) 12%, transparent);
		background: color-mix(in srgb, var(--onPanelColor) 6%, transparent);
		cursor: pointer;
	}

	.boatGalleryThumb.boatGalleryThumbActive {
		border-color: color-mix(in srgb, var(--accentColor) 64%, transparent);
	}

	.boatGalleryThumb img {
		width: 100%;
		height: 100%;
		object-fit: cover;
		display: block;
	}

	.boatDetailsSections {
		display: flex;
		flex-direction: column;
		gap: 12px;
	}

	.boatDetailsSection {
		border: 1px solid color-mix(in srgb, var(--onPanelColor) 10%, transparent);
		border-radius: 6px;
		padding: 12px;
	}

	.boatDetailsSection h3 {
		margin: 0 0 10px;
		font-size: 15px;
	}

	.boatDetailsList {
		margin: 0;
		padding-left: 18px;
		font-size: 13px;
		line-height: 1.45;
	}

	.boatDetailsDescription {
		font-size: 13px;
		line-height: 1.45;
		white-space: pre-wrap;
	}

	.boatOffersList {
		display: grid;
		gap: 8px;
	}

	.boatOfferCard {
		border-radius: 6px;
		padding: 10px;
		background: color-mix(in srgb, var(--onPanelColor) 6%, transparent);
	}

	.boatOfferCardTitle {
		font-size: 14px;
		font-weight: 700;
		margin-bottom: 8px;
	}

	@media (max-width: 760px) {
		.boatsLayout {
			padding: 12px;
		}

		.boatsToolbar {
			grid-template-columns: 1fr;
		}

		.boatsFilters {
			grid-template-columns: 1fr;
		}

		.boatDetailsGrid {
			grid-template-columns: 1fr;
		}

		.boatDetailsImage {
			min-height: 190px;
		}
	}
</style>

<div class="boatsLayout" id="boatsLayout">
	<div class="boatsPanel boatsToolbar">
		<input id="boatsSearchInput" type="text">
		<div id="boatsKindCombo" class="custom-select">
			<select id="boatsKindSelect">
				<option value=""></option>
				<option value="sailboat"></option>
				<option value="catamaran"></option>
				<option value="motorboat"></option>
				<option value="motoryacht"></option>
				<option value="gulet"></option>
			</select>
		</div>
		<div id="boatsCurrencyCombo" class="custom-select">
			<select id="boatsCurrencySelect">
				<option value=""></option>
				<option value="EUR">EUR</option>
				<option value="USD">USD</option>
				<option value="GBP">GBP</option>
			</select>
		</div>
		<input id="boatsDateFromInput" type="date">
		<input id="boatsDateToInput" type="date">
		<button id="boatsRefreshButton">$tr{Refresh}</button>
	</div>

	<div class="boatsPanel boatsFilters">
		<div id="boatsCompanyCombo" class="custom-select"><select id="boatsCompanySelect"><option value=""></option></select></div>
		<div id="boatsBaseCombo" class="custom-select"><select id="boatsBaseSelect"><option value=""></option></select></div>
		<div class="custom-spinbox">
			<input id="boatsMinCabinsInput" type="number" min="0" step="1">
			<div class="custom-spinbox-buttons">
				<button class="custom-spinbox-button" type="button" data-spinbox-target="boatsMinCabinsInput" data-spinbox-direction="up"><i class="fa-solid fa-chevron-up"></i></button>
				<button class="custom-spinbox-button" type="button" data-spinbox-target="boatsMinCabinsInput" data-spinbox-direction="down"><i class="fa-solid fa-chevron-down"></i></button>
			</div>
		</div>
		<div class="custom-spinbox">
			<input id="boatsMinBerthsInput" type="number" min="0" step="1">
			<div class="custom-spinbox-buttons">
				<button class="custom-spinbox-button" type="button" data-spinbox-target="boatsMinBerthsInput" data-spinbox-direction="up"><i class="fa-solid fa-chevron-up"></i></button>
				<button class="custom-spinbox-button" type="button" data-spinbox-target="boatsMinBerthsInput" data-spinbox-direction="down"><i class="fa-solid fa-chevron-down"></i></button>
			</div>
		</div>
		<div class="custom-spinbox">
			<input id="boatsMinLengthInput" type="number" min="0" step="0.1">
			<div class="custom-spinbox-buttons">
				<button class="custom-spinbox-button" type="button" data-spinbox-target="boatsMinLengthInput" data-spinbox-direction="up"><i class="fa-solid fa-chevron-up"></i></button>
				<button class="custom-spinbox-button" type="button" data-spinbox-target="boatsMinLengthInput" data-spinbox-direction="down"><i class="fa-solid fa-chevron-down"></i></button>
			</div>
		</div>
		<div id="boatsSortByCombo" class="custom-select">
			<select id="boatsSortBySelect">
				<option value=""></option>
				<option value="name"></option>
				<option value="availability"></option>
				<option value="price"></option>
				<option value="year"></option>
				<option value="length"></option>
				<option value="cabins"></option>
				<option value="berths"></option>
			</select>
		</div>
		<div id="boatsSortDirectionCombo" class="custom-select">
			<select id="boatsSortDirectionSelect">
				<option value=""></option>
				<option value="asc"></option>
				<option value="desc"></option>
			</select>
		</div>
		<button id="boatsClearFiltersButton" type="button">$tr{Clear filters}</button>
	</div>

	<div id="boatsStatus" class="boatsStatus"></div>
	<div id="boatsList" class="boatsList" aria-live="polite"></div>
	<div id="boatsDetailsModal" class="boatsModal boatsHidden" role="dialog" aria-modal="true">
		<div class="boatsModalBackdrop" id="boatsDetailsBackdrop"></div>
		<section class="boatsPanel boatDetailsPanel">
			<div class="boatDetailsHeader">
				<div>
					<div id="boatsDetailsTitle" class="boatDetailsTitle"></div>
					<div id="boatsDetailsSubtitle" class="boatSubtitle"></div>
				</div>
				<button id="boatsDetailsCloseButton" class="boatDetailsClose" type="button" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
			</div>
			<div id="boatsDetailsStatus" class="boatsStatus"></div>
			<div id="boatsDetailsContent"></div>
		</section>
	</div>
</div>

<script>
(function() {
	"use strict";

	var MODULE_NAME = "boats";
	var GET_BOATS_TASK = "GetBoatsTask";
	var GET_BOAT_TASK = "GetBoatTask";
	var GET_BOAT_OFFERS_TASK = "GetBoatOffersTask";
	var searchInput = document.getElementById("boatsSearchInput");
	var kindSelect = document.getElementById("boatsKindSelect");
	var currencySelect = document.getElementById("boatsCurrencySelect");
	var dateFromInput = document.getElementById("boatsDateFromInput");
	var dateToInput = document.getElementById("boatsDateToInput");
	var companySelect = document.getElementById("boatsCompanySelect");
	var baseSelect = document.getElementById("boatsBaseSelect");
	var minCabinsInput = document.getElementById("boatsMinCabinsInput");
	var minBerthsInput = document.getElementById("boatsMinBerthsInput");
	var minLengthInput = document.getElementById("boatsMinLengthInput");
	var sortBySelect = document.getElementById("boatsSortBySelect");
	var sortDirectionSelect = document.getElementById("boatsSortDirectionSelect");
	var clearFiltersButton = document.getElementById("boatsClearFiltersButton");
	var refreshButton = document.getElementById("boatsRefreshButton");
	var statusElement = document.getElementById("boatsStatus");
	var listElement = document.getElementById("boatsList");
	var detailsModal = document.getElementById("boatsDetailsModal");
	var detailsBackdrop = document.getElementById("boatsDetailsBackdrop");
	var detailsCloseButton = document.getElementById("boatsDetailsCloseButton");
	var detailsTitleElement = document.getElementById("boatsDetailsTitle");
	var detailsSubtitleElement = document.getElementById("boatsDetailsSubtitle");
	var detailsStatusElement = document.getElementById("boatsDetailsStatus");
	var detailsContentElement = document.getElementById("boatsDetailsContent");
	var searchTimer = null;
	var currentBoatDetails = null;
	var currentBoatOffers = null;
	var currentBoatImageIndex = 0;
	var customComboIds = [
		"boatsKindCombo",
		"boatsCurrencyCombo",
		"boatsCompanyCombo",
		"boatsBaseCombo",
		"boatsSortByCombo",
		"boatsSortDirectionCombo"
	];
	var TEXT_SEARCH_BOATS = "$tr{Search boats}";
	var TEXT_BOAT_TYPE = "$tr{Boat type}";
	var TEXT_ALL_BOAT_TYPES = "$tr{All boat types}";
	var TEXT_SAILBOAT = "$tr{Sailboat}";
	var TEXT_CATAMARAN = "$tr{Catamaran}";
	var TEXT_MOTORBOAT = "$tr{Motorboat}";
	var TEXT_MOTOR_YACHT = "$tr{Motor yacht}";
	var TEXT_GULET = "$tr{Gulet}";
	var TEXT_CURRENCY = "$tr{Currency}";
	var TEXT_EMPTY_RESPONSE = "$tr{Empty response.}";
	var TEXT_FAILED_TO_LOAD_BOATS = "$tr{Failed to load boats}";
	var TEXT_BOAT_IMAGE = "$tr{Boat image}";
	var TEXT_UNNAMED_BOAT = "$tr{Unnamed boat}";
	var TEXT_YEAR = "$tr{Year}";
	var TEXT_BASE = "$tr{Base}";
	var TEXT_COMPANY = "$tr{Company}";
	var TEXT_CABINS = "$tr{Cabins}";
	var TEXT_BERTHS = "$tr{Berths}";
	var TEXT_LENGTH = "$tr{Length}";
	var TEXT_DATES_FROM = "$tr{Date from}";
	var TEXT_DATES_TO = "$tr{Date to}";
	var TEXT_ALL_COMPANIES = "$tr{All companies}";
	var TEXT_ALL_BASES = "$tr{All bases}";
	var TEXT_MIN_CABINS = "$tr{Min cabins}";
	var TEXT_MIN_BERTHS = "$tr{Min berths}";
	var TEXT_MIN_LENGTH = "$tr{Min length}";
	var TEXT_SORT_BY = "$tr{Sort by}";
	var TEXT_SORT_DIRECTION = "$tr{Sort direction}";
	var TEXT_SORT_NAME = "$tr{Name}";
	var TEXT_SORT_AVAILABILITY = "$tr{Availability}";
	var TEXT_SORT_PRICE = "$tr{Price}";
	var TEXT_SORT_YEAR = "$tr{Year}";
	var TEXT_SORT_LENGTH = "$tr{Length}";
	var TEXT_SORT_CABINS = "$tr{Cabins}";
	var TEXT_SORT_BERTHS = "$tr{Berths}";
	var TEXT_ASCENDING = "$tr{Ascending}";
	var TEXT_DESCENDING = "$tr{Descending}";
	var TEXT_ROUTE = "$tr{Route}";
	var TEXT_START_PRICE = "$tr{Start price}";
	var TEXT_MATCHING_OFFERS = "$tr{Matching offers}";
	var TEXT_PHOTOS = "$tr{Photos}";
	var TEXT_PRICE = "$tr{Price}";
	var TEXT_AVAILABLE = "$tr{Available}";
	var TEXT_NO_MATCHING_OFFERS = "$tr{No matching offers for selected dates}";
	var TEXT_SELECT_DATES_FOR_AVAILABILITY = "$tr{Select dates to check availability}";
	var TEXT_LOADING_DETAILS = "$tr{Loading boat details}";
	var TEXT_FAILED_TO_LOAD_DETAILS = "$tr{Failed to load boat details}";
	var TEXT_LOADING_AVAILABILITY = "$tr{Loading availability}";
	var TEXT_DETAILS = "$tr{Details}";
	var TEXT_AVAILABILITY_AND_PRICE = "$tr{Availability and price}";
	var TEXT_DIMENSIONS = "$tr{Dimensions}";
	var TEXT_CAPACITY = "$tr{Capacity}";
	var TEXT_ENGINE = "$tr{Engine}";
	var TEXT_DEPOSIT = "$tr{Deposit}";
	var TEXT_BEAM = "$tr{Beam}";
	var TEXT_DRAUGHT = "$tr{Draught}";
	var TEXT_HEADS = "$tr{Heads}";
	var TEXT_WATER_CAPACITY = "$tr{Water capacity}";
	var TEXT_FUEL_CAPACITY = "$tr{Fuel capacity}";
	var TEXT_PRODUCTS_AND_EXTRAS = "$tr{Products and extras}";
	var TEXT_DESCRIPTIONS = "$tr{Descriptions}";
	var TEXT_PRODUCT = "$tr{Product}";
	var TEXT_DISCOUNT = "$tr{Discount}";
	var TEXT_CLOSE = "$tr{Close}";
	var TEXT_NO_BOATS_FOUND = "$tr{No boats found}";
	var TEXT_LOADING_BOATS = "$tr{Loading boats}";
	var TEXT_BOATS_LOADED = "$tr{Boats loaded}";

	function escapeHtml(value) {
		return String(value == null ? "" : value)
			.replace(/&/g, "&amp;")
			.replace(/</g, "&lt;")
			.replace(/>/g, "&gt;")
			.replace(/\"/g, "&quot;")
			.replace(/'/g, "&#39;");
	}

	function setStatus(message, isError) {
		statusElement.textContent = String(message || "");
		statusElement.classList.toggle("boatsError", isError === true);
	}

	function applyStaticTranslations() {
		searchInput.placeholder = TEXT_SEARCH_BOATS;
		currencySelect.value = currencySelect.value || "EUR";
		sortBySelect.value = sortBySelect.value || "name";
		sortDirectionSelect.value = sortDirectionSelect.value || "asc";
		kindSelect.setAttribute("aria-label", TEXT_BOAT_TYPE);
		currencySelect.setAttribute("aria-label", TEXT_CURRENCY);
		dateFromInput.setAttribute("aria-label", TEXT_DATES_FROM);
		dateFromInput.setAttribute("title", TEXT_DATES_FROM);
		dateToInput.setAttribute("aria-label", TEXT_DATES_TO);
		dateToInput.setAttribute("title", TEXT_DATES_TO);
		companySelect.setAttribute("aria-label", TEXT_COMPANY);
		baseSelect.setAttribute("aria-label", TEXT_BASE);
		minCabinsInput.setAttribute("aria-label", TEXT_MIN_CABINS);
		minCabinsInput.setAttribute("placeholder", TEXT_MIN_CABINS);
		minCabinsInput.setAttribute("title", TEXT_MIN_CABINS);
		minBerthsInput.setAttribute("aria-label", TEXT_MIN_BERTHS);
		minBerthsInput.setAttribute("placeholder", TEXT_MIN_BERTHS);
		minBerthsInput.setAttribute("title", TEXT_MIN_BERTHS);
		minLengthInput.setAttribute("aria-label", TEXT_MIN_LENGTH);
		minLengthInput.setAttribute("placeholder", TEXT_MIN_LENGTH);
		minLengthInput.setAttribute("title", TEXT_MIN_LENGTH);
		sortBySelect.setAttribute("aria-label", TEXT_SORT_BY);
		sortDirectionSelect.setAttribute("aria-label", TEXT_SORT_DIRECTION);
		detailsCloseButton.setAttribute("aria-label", TEXT_CLOSE);

		var kindLabels = {
			"": TEXT_ALL_BOAT_TYPES,
			sailboat: TEXT_SAILBOAT,
			catamaran: TEXT_CATAMARAN,
			motorboat: TEXT_MOTORBOAT,
			motoryacht: TEXT_MOTOR_YACHT,
			gulet: TEXT_GULET
		};
		for(var i = 0; i < kindSelect.options.length; i++) {
			var option = kindSelect.options[i];
			option.textContent = kindLabels[option.value] || option.value;
		}

		var sortLabels = {
			name: TEXT_SORT_NAME,
			availability: TEXT_SORT_AVAILABILITY,
			price: TEXT_SORT_PRICE,
			year: TEXT_SORT_YEAR,
			length: TEXT_SORT_LENGTH,
			cabins: TEXT_SORT_CABINS,
			berths: TEXT_SORT_BERTHS
		};
		for(var sortIndex = 0; sortIndex < sortBySelect.options.length; sortIndex++) {
			var sortOption = sortBySelect.options[sortIndex];
			sortOption.textContent = sortLabels[sortOption.value] || sortOption.value;
		}

		var directionLabels = {
			asc: TEXT_ASCENDING,
			desc: TEXT_DESCENDING
		};
		for(var directionIndex = 0; directionIndex < sortDirectionSelect.options.length; directionIndex++) {
			var directionOption = sortDirectionSelect.options[directionIndex];
			directionOption.textContent = directionLabels[directionOption.value] || directionOption.value;
		}

		refreshCustomComboboxes();
	}

	function refreshCustomComboboxes() {
		if(typeof customizeCombobox !== "function") {
			return;
		}

		for(var comboIndex = 0; comboIndex < customComboIds.length; comboIndex++) {
			var comboId = customComboIds[comboIndex];
			var combo = document.getElementById(comboId);
			if(!combo) {
				continue;
			}

			var staleNodes = combo.querySelectorAll(".select-selected, .select-items");
			for(var staleIndex = 0; staleIndex < staleNodes.length; staleIndex++) {
				staleNodes[staleIndex].remove();
			}

			var select = combo.getElementsByTagName("select")[0];
			if(select && select.options.length > 0) {
				customizeCombobox([combo]);
			}
		}
	}

	function request(taskCode, payload) {
		return new Promise(function(resolve, reject) {
			if(typeof sendRequest !== "function") {
				reject("sendRequest is not available");
				return;
			}

			sendRequest(MODULE_NAME, taskCode, payload || {}, function(resp) {
				if(!resp) {
					reject(TEXT_EMPTY_RESPONSE);
					return;
				}
				if(typeof window.respHasError === "function" && window.respHasError(resp)) {
					reject(resp.errorMessage || TEXT_FAILED_TO_LOAD_BOATS);
					return;
				}
				if(resp.errorMessage) {
					reject(resp.errorMessage);
					return;
				}
				resolve(resp.response || {});
			});
		});
	}

	function metaItem(label, value) {
		var normalizedValue = String(value == null || value === "" || value === 0 ? "-" : value);
		return "<div class=\"boatMetaItem\"><span class=\"boatMetaLabel\">" + escapeHtml(label) + "</span><span class=\"boatMetaValue\">" + escapeHtml(normalizedValue) + "</span></div>";
	}

	function formatMoney(amount, currency) {
		var normalizedAmount = Number(amount || 0);
		if(!normalizedAmount) {
			return "-";
		}
		return normalizedAmount.toLocaleString(undefined, { maximumFractionDigits: 0 }) + " " + String(currency || currencySelect.value || "EUR");
	}

	function isKnownBrokenBoatImageUrl(imageUrl) {
		var normalizedUrl = String(imageUrl || "").trim().toLowerCase();
		return normalizedUrl === "" || normalizedUrl.indexOf("/image123") !== -1;
	}

	function setSelectOptions(selectElement, values, emptyLabel) {
		var currentValue = selectElement.value || "";
		var normalizedValues = Array.isArray(values) ? values.filter(Boolean) : [];
		if(currentValue && normalizedValues.indexOf(currentValue) === -1) {
			normalizedValues = [currentValue].concat(normalizedValues);
		}

		selectElement.innerHTML = "";
		var emptyOption = document.createElement("option");
		emptyOption.value = "";
		emptyOption.textContent = emptyLabel;
		selectElement.appendChild(emptyOption);

		normalizedValues.forEach(function(value) {
			var option = document.createElement("option");
			option.value = value;
			option.textContent = value;
			selectElement.appendChild(option);
		});

		selectElement.value = currentValue && normalizedValues.indexOf(currentValue) !== -1 ? currentValue : "";
		refreshCustomComboboxes();
	}

	function collectUsableImages(boat) {
		var images = Array.isArray(boat.images) ? boat.images : [];
		var usableImages = images.filter(function(image) {
			return image && image.url && !isKnownBrokenBoatImageUrl(image.url);
		});
		if(!usableImages.length && boat.imageUrl && !isKnownBrokenBoatImageUrl(boat.imageUrl)) {
			usableImages.push({
				url: boat.imageUrl,
				description: boat.name || TEXT_BOAT_IMAGE
			});
		}
		return usableImages;
	}

	function renderOfferBadge(offer, datesApplied) {
		if(offer) {
			return "<div class=\"boatOfferBadge\"><div class=\"boatMetaLabel\">" + escapeHtml(TEXT_AVAILABLE) + "</div>" +
				"<div class=\"boatOfferPrice\">" + escapeHtml(formatMoney(offer.price, offer.currency)) + "</div>" +
				"<div>" + escapeHtml([offer.dateFrom, offer.dateTo].filter(Boolean).join(" - ")) + "</div></div>";
		}
		if(datesApplied) {
			return "<div class=\"boatMutedNote\">" + escapeHtml(TEXT_NO_MATCHING_OFFERS) + "</div>";
		}
		return "";
	}

	function renderBoatCard(boat, datesApplied) {
		var imageUrl = String(boat.imageUrl || "");
		var imageHtml = !isKnownBrokenBoatImageUrl(imageUrl)
			? "<img src=\"" + escapeHtml(imageUrl) + "\" alt=\"" + escapeHtml(boat.name || TEXT_BOAT_IMAGE) + "\" loading=\"lazy\" onerror=\"this.style.display='none'\">"
			: "";

		return "<article class=\"boatsPanel boatCard\" tabindex=\"0\" data-boat-id=\"" + escapeHtml(boat.id || "") + "\">" +
			"<div class=\"boatImage\">" + imageHtml + "<div class=\"boatImageFallback\"><i class=\"fa-solid fa-ship\"></i></div></div>" +
			"<div class=\"boatCardBody\">" +
			"<div><div class=\"boatTitle\">" + escapeHtml(boat.name || TEXT_UNNAMED_BOAT) + "</div>" +
			"<div class=\"boatSubtitle\">" + escapeHtml([boat.model, boat.kind].filter(Boolean).join(" • ")) + "</div></div>" +
			renderOfferBadge(boat.offer, datesApplied) +
			"<div class=\"boatMetaGrid\">" +
			metaItem(TEXT_YEAR, boat.year) +
			metaItem(TEXT_BASE, boat.homeBase) +
			metaItem(TEXT_COMPANY, boat.company) +
			metaItem(TEXT_CABINS, boat.cabins) +
			metaItem(TEXT_BERTHS, boat.berths) +
			metaItem(TEXT_LENGTH, boat.length ? boat.length + " m" : "") +
			"</div></div></article>";
	}

	function renderBoats(items, response) {
		setSelectOptions(companySelect, response && response.availableCompanies, TEXT_ALL_COMPANIES);
		setSelectOptions(baseSelect, response && response.availableBases, TEXT_ALL_BASES);

		if(!Array.isArray(items) || items.length === 0) {
			listElement.innerHTML = "<div class=\"boatsPanel\">" + escapeHtml(TEXT_NO_BOATS_FOUND) + "</div>";
			return;
		}

		listElement.innerHTML = items.map(function(boat) { return renderBoatCard(boat, response && response.datesApplied); }).join("");
	}

	function closeDetails() {
		currentBoatDetails = null;
		currentBoatOffers = null;
		currentBoatImageIndex = 0;
		detailsModal.classList.add("boatsHidden");
		detailsTitleElement.textContent = "";
		detailsSubtitleElement.textContent = "";
		detailsStatusElement.textContent = "";
		detailsContentElement.innerHTML = "";
	}

	function renderAvailability(offerResponse) {
		if(!offerResponse || !offerResponse.datesApplied) {
			return "<div class=\"boatMutedNote\">" + escapeHtml(TEXT_SELECT_DATES_FOR_AVAILABILITY) + "</div>";
		}
		if(!offerResponse.hasOffer) {
			return "<div class=\"boatMutedNote\">" + escapeHtml(TEXT_NO_MATCHING_OFFERS) + "</div>";
		}

		var offer = offerResponse.bestOffer || {};
		return "<div class=\"boatMetaGrid\">" +
			metaItem(TEXT_PRICE, formatMoney(offer.price, offer.currency)) +
			metaItem(TEXT_START_PRICE, offer.startPrice ? formatMoney(offer.startPrice, offer.currency) : "") +
			metaItem(TEXT_DISCOUNT, offer.discountPercentage ? offer.discountPercentage + "%" : "") +
			metaItem(TEXT_PRODUCT, offer.product) +
			metaItem(TEXT_ROUTE, [offer.startBase, offer.endBase].filter(Boolean).join(" -> ")) +
			metaItem(TEXT_DATES_FROM, offer.dateFrom) +
			metaItem(TEXT_DATES_TO, offer.dateTo) +
			"</div>";
	}

	function renderOffersList(offerResponse) {
		var offers = offerResponse && Array.isArray(offerResponse.offers) ? offerResponse.offers : [];
		if(!offers.length) {
			return "";
		}

		return "<div class=\"boatDetailsSection\"><h3>" + escapeHtml(TEXT_MATCHING_OFFERS) + "</h3><div class=\"boatOffersList\">" +
			offers.map(function(offer, index) {
				return "<div class=\"boatOfferCard\"><div class=\"boatOfferCardTitle\">" + escapeHtml(TEXT_AVAILABLE + " " + (index + 1)) + "</div><div class=\"boatMetaGrid\">" +
					metaItem(TEXT_PRICE, formatMoney(offer.price, offer.currency)) +
					metaItem(TEXT_START_PRICE, offer.startPrice ? formatMoney(offer.startPrice, offer.currency) : "") +
					metaItem(TEXT_DISCOUNT, offer.discountPercentage ? offer.discountPercentage + "%" : "") +
					metaItem(TEXT_PRODUCT, offer.product) +
					metaItem(TEXT_ROUTE, [offer.startBase, offer.endBase].filter(Boolean).join(" -> ")) +
					metaItem(TEXT_DATES_FROM, offer.dateFrom) +
					metaItem(TEXT_DATES_TO, offer.dateTo) +
					"</div></div>";
			}).join("") +
			"</div></div>";
	}

	function renderDetails(boat, offerResponse) {
		currentBoatDetails = boat;
		currentBoatOffers = offerResponse;

		var usableImages = collectUsableImages(boat);
		if(currentBoatImageIndex >= usableImages.length) {
			currentBoatImageIndex = 0;
		}
		var selectedImage = usableImages[currentBoatImageIndex] || null;
		var imageHtml = selectedImage
			? "<img src=\"" + escapeHtml(selectedImage.url) + "\" alt=\"" + escapeHtml(selectedImage.description || boat.name || TEXT_BOAT_IMAGE) + "\" loading=\"lazy\" onerror=\"this.style.display='none'\">"
			: "";
		var thumbnailsHtml = usableImages.length > 1
			? "<div class=\"boatGalleryThumbs\">" + usableImages.map(function(image, imageIndex) {
				return "<button type=\"button\" class=\"boatGalleryThumb " + (imageIndex === currentBoatImageIndex ? "boatGalleryThumbActive" : "") + "\" data-image-index=\"" + imageIndex + "\"><img src=\"" + escapeHtml(image.url) + "\" alt=\"" + escapeHtml(image.description || boat.name || TEXT_PHOTOS) + "\" loading=\"lazy\"></button>";
			}).join("") + "</div>"
			: "";
		var descriptions = Array.isArray(boat.descriptions) ? boat.descriptions : [];
		var products = Array.isArray(boat.products) ? boat.products : [];
		var descriptionsHtml = descriptions.length
			? descriptions.map(function(description) { return "<div class=\"boatDetailsDescription\">" + escapeHtml(description.text || "") + "</div>"; }).join("")
			: "<div class=\"boatMutedNote\">-</div>";
		var productsHtml = products.length
			? "<ul class=\"boatDetailsList\">" + products.map(function(product) {
				var extras = Array.isArray(product.extras) ? product.extras : [];
				var extrasText = extras.slice(0, 4).map(function(extra) { return extra.name; }).filter(Boolean).join(", ");
				return "<li>" + escapeHtml([product.name, extrasText].filter(Boolean).join(": ")) + "</li>";
			}).join("") + "</ul>"
			: "<div class=\"boatMutedNote\">-</div>";

		detailsTitleElement.textContent = boat.name || TEXT_UNNAMED_BOAT;
		detailsSubtitleElement.textContent = [boat.model, boat.kind, boat.year].filter(Boolean).join(" • ");
		detailsContentElement.innerHTML = "<div class=\"boatDetailsGrid\">" +
			"<div><div class=\"boatImage boatDetailsImage\">" + imageHtml + "<div class=\"boatImageFallback\"><i class=\"fa-solid fa-ship\"></i></div></div>" + thumbnailsHtml + "</div>" +
			"<div class=\"boatDetailsSections\">" +
			"<div class=\"boatDetailsSection\"><h3>" + escapeHtml(TEXT_AVAILABILITY_AND_PRICE) + "</h3>" + renderAvailability(offerResponse) + "</div>" +
			"<div class=\"boatDetailsSection\"><h3>" + escapeHtml(TEXT_DETAILS) + "</h3><div class=\"boatMetaGrid\">" +
			metaItem(TEXT_COMPANY, boat.company) + metaItem(TEXT_BASE, boat.homeBase) + metaItem(TEXT_ENGINE, boat.engine) + metaItem(TEXT_DEPOSIT, boat.deposit ? formatMoney(boat.deposit, boat.currency) : "") +
			"</div></div>" +
			"<div class=\"boatDetailsSection\"><h3>" + escapeHtml(TEXT_DIMENSIONS) + "</h3><div class=\"boatMetaGrid\">" +
			metaItem(TEXT_LENGTH, boat.length ? boat.length + " m" : "") + metaItem(TEXT_BEAM, boat.beam ? boat.beam + " m" : "") + metaItem(TEXT_DRAUGHT, boat.draught ? boat.draught + " m" : "") + metaItem(TEXT_WATER_CAPACITY, boat.waterCapacity) + metaItem(TEXT_FUEL_CAPACITY, boat.fuelCapacity) +
			"</div></div>" +
			"<div class=\"boatDetailsSection\"><h3>" + escapeHtml(TEXT_CAPACITY) + "</h3><div class=\"boatMetaGrid\">" +
			metaItem(TEXT_CABINS, boat.cabins) + metaItem(TEXT_BERTHS, boat.berths) + metaItem(TEXT_HEADS, boat.heads) +
			"</div></div>" +
			renderOffersList(offerResponse) +
			"<div class=\"boatDetailsSection\"><h3>" + escapeHtml(TEXT_PRODUCTS_AND_EXTRAS) + "</h3>" + productsHtml + "</div>" +
			"<div class=\"boatDetailsSection\"><h3>" + escapeHtml(TEXT_DESCRIPTIONS) + "</h3>" + descriptionsHtml + "</div>" +
			"</div></div>";
	}

	function openBoatDetails(boatId) {
		if(!boatId) {
			return;
		}
		detailsModal.classList.remove("boatsHidden");
		currentBoatImageIndex = 0;
		detailsTitleElement.textContent = TEXT_LOADING_DETAILS + "...";
		detailsSubtitleElement.textContent = "";
		detailsStatusElement.textContent = "";
		detailsStatusElement.classList.remove("boatsError");
		detailsContentElement.innerHTML = "";

		request(GET_BOAT_TASK, {
			boatId: boatId,
			currency: currencySelect.value || "EUR"
		}).then(function(response) {
			var boat = response.boat || {};
			renderDetails(boat, null);
			if(!dateFromInput.value || !dateToInput.value) {
				return;
			}

			detailsStatusElement.textContent = TEXT_LOADING_AVAILABILITY + "...";
			return request(GET_BOAT_OFFERS_TASK, {
				boatId: boat.id || boatId,
				companyId: boat.companyId || "",
				kind: boat.kind || kindSelect.value || "",
				currency: currencySelect.value || "EUR",
				dateFrom: dateFromInput.value,
				dateTo: dateToInput.value
			}).then(function(offerResponse) {
				detailsStatusElement.textContent = "";
				detailsStatusElement.classList.remove("boatsError");
				renderDetails(boat, offerResponse);
			}).catch(function(errorMessage) {
				detailsStatusElement.textContent = String(errorMessage || TEXT_FAILED_TO_LOAD_DETAILS);
				detailsStatusElement.classList.add("boatsError");
			});
		}).catch(function(errorMessage) {
			detailsContentElement.innerHTML = "";
			detailsStatusElement.textContent = String(errorMessage || TEXT_FAILED_TO_LOAD_DETAILS);
			detailsStatusElement.classList.add("boatsError");
		});
	}

	function loadBoats() {
		refreshButton.disabled = true;
		setStatus(TEXT_LOADING_BOATS + "...", false);

		request(GET_BOATS_TASK, {
			search: searchInput.value || "",
			kind: kindSelect.value || "",
			companyName: companySelect.value || "",
			homeBase: baseSelect.value || "",
			minCabins: minCabinsInput.value || 0,
			minBerths: minBerthsInput.value || 0,
			minLength: minLengthInput.value || 0,
			sortBy: sortBySelect.value || "name",
			sortDirection: sortDirectionSelect.value || "asc",
			currency: currencySelect.value || "EUR",
			dateFrom: dateFromInput.value || "",
			dateTo: dateToInput.value || ""
		}).then(function(response) {
			renderBoats(response.items || [], response);
			if(response.datesApplied && !response.offersMatchedCount) {
				setStatus(TEXT_BOATS_LOADED + ": " + String(response.count || 0) + ". " + TEXT_NO_MATCHING_OFFERS, false);
			} else {
				setStatus(TEXT_BOATS_LOADED + ": " + String(response.count || 0), false);
			}
		}).catch(function(errorMessage) {
			listElement.innerHTML = "";
			setStatus(String(errorMessage || TEXT_FAILED_TO_LOAD_BOATS), true);
		}).finally(function() {
			refreshButton.disabled = false;
		});
	}

	function scheduleLoadBoats() {
		if(searchTimer) {
			window.clearTimeout(searchTimer);
		}
		searchTimer = window.setTimeout(loadBoats, 250);
	}

	function clearFilters() {
		companySelect.value = "";
		baseSelect.value = "";
		minCabinsInput.value = "";
		minBerthsInput.value = "";
		minLengthInput.value = "";
		sortBySelect.value = "name";
		sortDirectionSelect.value = "asc";
		refreshCustomComboboxes();
		loadBoats();
	}

	function stepSpinbox(input, direction) {
		if(!input) {
			return;
		}

		if(direction === "down") {
			input.stepDown();
		} else {
			input.stepUp();
		}

		if(input.value && Number(input.value) < 0) {
			input.value = 0;
		}

		input.dispatchEvent(new Event("input", { bubbles: true }));
		input.dispatchEvent(new Event("change", { bubbles: true }));
	}

	refreshButton.addEventListener("click", loadBoats);
	kindSelect.addEventListener("change", loadBoats);
	currencySelect.addEventListener("change", loadBoats);
	dateFromInput.addEventListener("change", loadBoats);
	dateToInput.addEventListener("change", loadBoats);
	companySelect.addEventListener("change", loadBoats);
	baseSelect.addEventListener("change", loadBoats);
	minCabinsInput.addEventListener("input", scheduleLoadBoats);
	minBerthsInput.addEventListener("input", scheduleLoadBoats);
	minLengthInput.addEventListener("input", scheduleLoadBoats);
	sortBySelect.addEventListener("change", loadBoats);
	sortDirectionSelect.addEventListener("change", loadBoats);
	clearFiltersButton.addEventListener("click", clearFilters);
	searchInput.addEventListener("input", scheduleLoadBoats);
	document.querySelectorAll(".custom-spinbox-button").forEach(function(button) {
		button.addEventListener("click", function() {
			var targetId = button.getAttribute("data-spinbox-target");
			var direction = button.getAttribute("data-spinbox-direction") || "up";
			stepSpinbox(document.getElementById(targetId), direction);
		});
	});
	detailsCloseButton.addEventListener("click", closeDetails);
	detailsBackdrop.addEventListener("click", closeDetails);
	detailsContentElement.addEventListener("click", function(event) {
		var thumb = event.target.closest("[data-image-index]");
		if(!thumb || !currentBoatDetails) {
			return;
		}
		currentBoatImageIndex = Number(thumb.getAttribute("data-image-index")) || 0;
		renderDetails(currentBoatDetails, currentBoatOffers);
	});
	listElement.addEventListener("click", function(event) {
		var card = event.target.closest(".boatCard");
		if(card) {
			openBoatDetails(card.getAttribute("data-boat-id"));
		}
	});
	listElement.addEventListener("keydown", function(event) {
		if(event.key !== "Enter" && event.key !== " ") {
			return;
		}
		var card = event.target.closest(".boatCard");
		if(card) {
			event.preventDefault();
			openBoatDetails(card.getAttribute("data-boat-id"));
		}
	});
	document.addEventListener("keydown", function(event) {
		if(event.key === "Escape") {
			closeDetails();
		}
	});

	applyStaticTranslations();
	loadBoats();
})();
</script>
